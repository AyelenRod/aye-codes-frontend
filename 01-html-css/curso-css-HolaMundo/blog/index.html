<!DOCTYPE html>
<html>
<head>
    <title>Blog con CSS</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header id="titulo"> <!-- La etiqueta header se utiliza para definir un encabezado para un documento o una sección. -->
        <h1>Blog de Aye</h1> <!-- El atributo id se utiliza para identificar un elemento de manera única en el documento. -->
    </header>
    <section class="container"> <!-- La etiqueta section se utiliza para definir una sección en un documento. -->
        <article> <!-- La etiqueta article se utiliza para definir un artículo independiente en un documento. -->
            <h2 class="articulos">Titulo de mi post</h2>
            <p>Este es el contenido del articulo 1.</p>
            <img src="img/gatito.jpg" width="400"/> 
            <p>Mas texto de prueba.</p>
        </article>
         <article> 
            <h2 class="articulos">Titulo de mi post 2</h2> <!-- El atributo class se utiliza para definir una o varias clases para un elemento, lo que permite aplicar estilos CSS a esos elementos. -->
            <p>Este es el contenido del articulo 2.</p>
            <img src="img/foca.jpg" width="400"/> 
            <p>Mas texto de prueba.</p>
        </article>
    </section>
    <footer> <!-- La etiqueta footer se utiliza para definir un pie de página para un documento o una sección. -->
        <section>
            <a href="#titulo">Volver al inicio</a> <!--  Se usa # para ir al elemento con el id especificado -->
            <a href="mailto:ayelefl0res220815@gmail.com">Contactar por correo</a>
        </section>
        <p>© 2026 Blog de Aye. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
