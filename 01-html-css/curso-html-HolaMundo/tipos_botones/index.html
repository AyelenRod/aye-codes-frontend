<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botones</title>
</head>
<body>
    <h1>Tipos de botones</h1>
    <button type="reset">Botón de reinicio</button>
    <button type="submit">Botón de envío</button>
    <button type="button">Botón normal</button>
    <!--button permite crear un botón personalizado con estilos propios, 
    mientras que input con type button es un botón predefinido que no se puede personalizar tanto como el botón.
    El boton de tipo button se especifica con javascript que queremos que haga.-->
</body>
</html>
