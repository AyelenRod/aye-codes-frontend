<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Tipos de input</h1>
    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre"/>
        <br>
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="Ingrese su correo electrónico"/>
        <br>
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Ingrese su contraseña"/>
        <br>
        <label for="numero">Numero</label>
        <input type="number" id="numero" name="numero" placeholder="Ingrese su numero"/>
        <br>
        <label for="fecha">Fecha de nacimiento</label>
        <input type="date" id="fecha" name="fecha"/>
        <br>
        <label for="file">Archivo</label>
        <input type="file" id="file" name="file"/>
        <br>
        <label for="button">Botón</label>
        <input type="button" id="button" name="button" value="Presionar"/>
        <br>
        <label for="checkbox">Checkbox</label>
        <input type="checkbox" id="checkbox" name="checkbox"/>
        <br>
        <label for="radio">Radio</label>
        <input type="radio" id="radio" name="radio"/>
        <br>
        <label for="textarea">Área de texto</label>
        <textarea id="textarea" name="textarea" placeholder="Ingrese su texto"></textarea>
        <br>
        <label for="reset">Reset</label>
        <input type="reset" id="reset" name="reset" value="Restablecer"/>
        <br>
        <label for="tel">Número de teléfono</label>
        <input type="tel" id="tel" name="tel" placeholder="Ingrese su número de teléfono"/>
        <br>
        <label for="color">Color favorito</label>
        <input type="color" id="color" name="color"/>
        <br>
        <label for="range">Rango</label>
        <input type="range" id="range" name="range"/>
        <br>
        <label for="img">Imagen</label>
        <input type="image" id="img" name="img" src="img/gatito.jpg" alt="Imagen de ejemplo"/>
        <br>
        <label for="search">Buscar</label>
        <input type="search" id="search" name="search" placeholder="Ingrese su búsqueda"/>
        <br>
        <label for="time">Hora</label>
        <input type="time" id="time" name="time"/>
        <br>
        <label for="url">URL</label>
        <input type="url" id="url" name="url" placeholder="Ingrese su URL"/>
        <br>
        <label for="hidden">Oculto</label>
        <input type="hidden" id="hidden" name="hidden" value="valor oculto"/>
        <br>
        <label for="submit">Enviar</label>
        <input type="submit" id="submit" name="submit" value="Enviar"/>
        <br>

</body>
</html>
