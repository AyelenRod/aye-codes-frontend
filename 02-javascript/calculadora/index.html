<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora HTML</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Calculadora HTML</h1>
    <section class="calculadora">
        <input type="text" id="num1" placeholder="Número 1">
        <input type="text" id="operador" placeholder="+ - * /">
        <input type="text" id="num2" placeholder="Número 2">
        <input type="button" id="calcular" value="Calcular">
    </section>
    <p id="resultado"></p>
    
</body>
</html>
